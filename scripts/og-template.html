<!DOCTYPE html>
<!--
  Dev-only template for generating 1200×630 Open Graph / Twitter social cards.
  Not shipped to users. Render with ?title=&subtitle=&icon= and screenshot the
  .card element at 1200×630. See scripts/README or CRA-6 for usage.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #0b0d11; }
  .card {
    width: 1200px;
    height: 630px;
    background:
      radial-gradient(900px 600px at 80% -20%, #20303a 0%, rgba(14,16,20,0) 60%),
      radial-gradient(800px 600px at 0% 120%, #2a1622 0%, rgba(14,16,20,0) 55%),
      #0e1014;
    color: #f2f4f8;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding: 84px 88px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -0.01em;
  }
  .brand .dot { color: #ff5d5d; }
  .brand .badge {
    margin-left: 6px;
    font-size: 17px;
    font-weight: 600;
    color: #9aa3b2;
    border: 1px solid #2a2f3a;
    border-radius: 999px;
    padding: 6px 14px;
  }
  .body { display: flex; align-items: center; gap: 40px; }
  .icon {
    flex: none;
    width: 132px; height: 132px;
    border-radius: 30px;
    background: #171a21;
    border: 1px solid #2a2f3a;
    display: grid;
    place-items: center;
    font-size: 70px;
    color: #4dd6c1;
    box-shadow: 0 30px 70px -30px rgba(0,0,0,0.8);
  }
  .text { display: flex; flex-direction: column; gap: 18px; }
  h1 {
    font-size: 78px;
    line-height: 1.02;
    font-weight: 800;
    letter-spacing: -0.03em;
    max-width: 720px;
  }
  p.sub {
    font-size: 30px;
    line-height: 1.32;
    color: #9aa3b2;
    max-width: 740px;
    font-weight: 400;
  }
  .foot {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 24px;
    color: #9aa3b2;
  }
  .pill {
    color: #f2f4f8;
    border: 1px solid #2a2f3a;
    border-radius: 999px;
    padding: 8px 18px;
    font-weight: 600;
    font-size: 22px;
  }
  .accent-bar {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 10px;
    background: linear-gradient(90deg, #ff5d5d, #4dd6c1);
  }
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="brand">music<span class="dot">·</span>tools<span class="badge" id="badge">free web tools</span></div>
    <div class="body">
      <div class="icon" id="icon">♪</div>
      <div class="text">
        <h1 id="title">Online Metronome</h1>
        <p class="sub" id="sub">Rock-solid Web Audio timing in your browser.</p>
      </div>
    </div>
    <div class="foot">
      <span class="pill">100% free</span>
      <span>·</span>
      <span>no signup &nbsp;·&nbsp; no ads in the way</span>
    </div>
    <div class="accent-bar"></div>
  </div>
  <script>
    var q = new URLSearchParams(location.search);
    if (q.get('title')) document.getElementById('title').textContent = q.get('title');
    if (q.get('sub')) document.getElementById('sub').textContent = q.get('sub');
    if (q.get('icon')) document.getElementById('icon').textContent = q.get('icon');
    if (q.get('badge')) document.getElementById('badge').textContent = q.get('badge');
  </script>
</body>
</html>
